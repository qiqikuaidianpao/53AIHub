<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>53AIKM</title>
  </head>
  <body>
    <div id="root"></div>

    <script>
      function getSearchParam() {
        const search = location.search.split("?")[1] || "";
        const reg = /([^?&=]+)=([^?&=]+)/g;
        const params = {};
        search.match(reg)?.forEach((item) => {
          const [key, value] = item.split("=");
          params[decodeURIComponent(key)] = decodeURIComponent(value || "");
        });
        return params;
      }
      function joinSearchParam(params = {}) {
        let search = "";
        Object.keys(params).forEach((key) => {
          search += `${key}=${params[key]}&`;
        });
        if (search) search = `?${search}`;
        return search;
      }
      const search_params = getSearchParam();
      if (search_params.api_host)
        window.api_host = `http://${search_params.api_host
          .replace(/^https?:\/\//, "")
          .replace(/\/$/, "")}`;
      if (search_params.qyy_host)
        window.qyy_host = `http://${search_params.qyy_host
          .replace(/^https?:\/\//, "")
          .replace(/\/$/, "")}`;
      const provider_type = location.search.includes("provider_type")
        ? location.search.split("provider_type=")[1]
        : "";
      const provider_id = location.search.includes("provider_id")
        ? location.search.split("provider_id=")[1]
        : "";
      const is_authorized = location.search.includes("is_authorized")
        ? location.search.split("is_authorized=")[1]
        : "";
      if (search_params.provider_type) {
        if (window.opener) {
          window.opener.postMessage(
            {
              provider_type: search_params.provider_type,
              provider_id: search_params.provider_id,
              is_authorized: search_params.is_authorized,
            },
            "*",
          );
        } else {
          window.postMessage(
            {
              provider_type: search_params.provider_type,
              provider_id: search_params.provider_id,
              is_authorized: search_params.is_authorized,
            },
            "*",
          );
        }
      }
      if (search_params.access_token) {
        localStorage.removeItem("access_token");
        localStorage.removeItem("user_info");
        localStorage.setItem("access_token", search_params.access_token);
        localStorage.setItem(
          "user_info",
          JSON.stringify({
            access_token: search_params.access_token,
            user_id: "",
            eid: search_params.eid,
          }),
        );
        delete search_params.access_token;
        delete search_params.eid;
        if (search_params.from_origin) {
          sessionStorage.setItem(
            "from_origin",
            decodeURIComponent(search_params.from_origin),
          );
          delete search_params.from_origin;
        }
        location.search = joinSearchParam(search_params);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 延迟加载百度统计脚本，不阻塞页面渲染
      // 在页面完全加载后再加载统计脚本，避免影响 FCP
      (function () {
        function loadBaiduAnalytics() {
          var _hmt = _hmt || [];
          var hm = document.createElement("script");
          hm.src =
            "https://hm.baidu.com/hm.js?c0e32ea294a4fc371fe6ec64187e36e1";
          hm.async = true; // 异步加载
          var s = document.getElementsByTagName("script")[0];
          s.parentNode.insertBefore(hm, s);
        }

        // 页面加载完成后延迟加载统计脚本
        if (document.readyState === "complete") {
          setTimeout(loadBaiduAnalytics, 1000);
        } else {
          window.addEventListener(
            "load",
            function () {
              setTimeout(loadBaiduAnalytics, 1000);
            },
            { once: true },
          );
        }
      })();
    </script>
  </body>
</html>
