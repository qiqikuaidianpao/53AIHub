<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Plugin SDK Test Page</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 40px;
        background-color: #f5f5f5;
      }
      h1 {
        color: #333;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .info {
        color: #666;
        margin: 20px 0;
      }
      .config-section {
        margin: 30px 0;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
      }
      .config-section h3 {
        margin-top: 0;
      }
      .config-section label {
        display: block;
        margin: 10px 0 5px;
        font-weight: 500;
      }
      .config-section input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .config-section button {
        margin-top: 15px;
        padding: 10px 24px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      .config-section button:hover {
        background: #1d4ed8;
      }
      .log {
        margin-top: 20px;
        padding: 15px;
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 8px;
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 13px;
        max-height: 200px;
        overflow-y: auto;
      }
      .log-entry {
        margin: 2px 0;
      }
      .log-entry.info {
        color: #4ec9b0;
      }
      .log-entry.error {
        color: #f44747;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Agent Plugin SDK Test Page</h1>
      <p class="info">
        This page tests the embeddable SDK. After configuring, click "Initialize
        SDK" to start.
      </p>

      <div class="config-section">
        <h3>SDK Configuration</h3>
        <label>H5 Token:</label>
        <input type="text" id="token" value="" placeholder="Enter your H5 token" />

        <label>Agent Name:</label>
        <input type="text" id="name" value="AI Assistant" />

        <label>Agent Logo URL (optional):</label>
        <input
          type="text"
          id="logo"
          value=""
          placeholder="Leave empty for default icon"
        />

        <label>Position:</label>
        <input
          type="text"
          id="position"
          value="bottom-right"
          placeholder="bottom-right or bottom-left"
        />

        <button onclick="initSDK()">Initialize SDK</button>
        <button
          onclick="destroySDK()"
          style="background: #ef4444; margin-left: 10px"
        >
          Destroy SDK
        </button>
      </div>

      <div class="log" id="log"></div>
    </div>

    <script>
      var sdkInstance = null;

      function log(message, type) {
        var logEl = document.getElementById("log");
        var entry = document.createElement("div");
        entry.className = "log-entry " + (type || "info");
        entry.textContent =
          "[" + new Date().toLocaleTimeString() + "] " + message;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function initSDK() {
        var token = document.getElementById("token").value;
        var name = document.getElementById("name").value;
        var logo = document.getElementById("logo").value;
        var position = document.getElementById("position").value;

        if (!token) {
          log("Error: token is required", "error");
          return;
        }

        var config = {
          token: token,
          name: name,
          position: position,
          autoOpen: false,
          persistState: true,
        };

        if (logo) {
          config.logo = logo;
        }

        try {
          sdkInstance = AgentPluginSDK.init(config);
          log("SDK initialized successfully");
          log("SDK Version: " + AgentPluginSDK.version);
        } catch (err) {
          log("SDK initialization failed: " + err.message, "error");
        }
      }

      function destroySDK() {
        if (sdkInstance) {
          sdkInstance.destroy();
          sdkInstance = null;
          log("SDK destroyed");
        } else {
          log("No SDK instance to destroy", "error");
        }
      }

      log('Test page loaded. Click "Initialize SDK" to start.');
    </script>

    <!-- In production, use the built SDK file: -->
    <!-- <script src="./dist-sdk/agent-plugin-sdk.iife.js"></script> -->

    <!-- For development, load the SDK after building: -->
    <script>
      // Auto-load SDK script if available
      var sdkScript = document.createElement("script");
      sdkScript.src = "./dist-sdk/agent-plugin-sdk.iife.js";
      sdkScript.onload = function () {
        log("SDK script loaded");
      };
      sdkScript.onerror = function () {
        log('SDK script not found. Run "pnpm build:sdk" first.', "error");
      };
      document.head.appendChild(sdkScript);
    </script>
  </body>
</html>
